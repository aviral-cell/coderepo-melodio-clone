<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodio API Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --melodio-green: #1DB954;
            --melodio-green-dark: #1ed760;
            --melodio-black: #121212;
            --melodio-dark-gray: #181818;
            --melodio-light-gray: #282828;
            --melodio-text: #ffffff;
            --melodio-text-subdued: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: var(--melodio-black);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--melodio-text);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--melodio-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 32px rgba(29, 185, 84, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(29, 185, 84, 0.4);
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: var(--melodio-black);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--melodio-text);
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--melodio-text-subdued);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .card {
            background: var(--melodio-dark-gray);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--melodio-green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4);
            }
            50% {
                opacity: 0.8;
                box-shadow: 0 0 0 4px rgba(29, 185, 84, 0);
            }
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--melodio-green);
            font-weight: 500;
        }

        .api-link {
            display: inline-block;
            background: var(--melodio-green);
            color: var(--melodio-black);
            text-decoration: none;
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background-color 0.2s ease, transform 0.2s ease;
            letter-spacing: 0.02em;
        }

        .api-link:hover {
            background: var(--melodio-green-dark);
            transform: scale(1.04);
        }

        .api-link:active {
            transform: scale(1);
        }

        .footer {
            margin-top: 2rem;
            color: var(--melodio-text-subdued);
            font-size: 0.75rem;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: var(--melodio-light-gray);
            margin: 1.5rem 0;
        }

        .info-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--melodio-text-subdued);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 0.875rem;
            color: var(--melodio-text);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 14.36c-.19.19-.45.3-.71.3-.26 0-.51-.1-.71-.29-.39-.39-.39-1.02 0-1.41 1.95-1.95 1.95-5.12 0-7.07-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0 2.73 2.73 2.73 7.17 0 9.9zM14.82 12c0 1.1-.45 2.1-1.17 2.83-.39.39-1.02.39-1.41 0-.39-.39-.39-1.02 0-1.41.39-.39.58-.89.58-1.41 0-.52-.19-1.02-.58-1.41-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0 .72.72 1.17 1.73 1.17 2.83zM8 12c0-2.21 1.79-4 4-4v2c-1.1 0-2 .9-2 2s.9 2 2 2v2c-2.21 0-4-1.79-4-4z"/>
            </svg>
        </div>
        <h1>Melodio</h1>
        <p class="subtitle">Music Streaming API Server</p>

        <div class="card">
            <div class="status">
                <span class="status-dot"></span>
                <span class="status-text">Server Running</span>
            </div>

            <div class="divider"></div>

            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">Version</div>
                    <div class="info-value">1.0.0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Environment</div>
                    <div class="info-value">Development</div>
                </div>
            </div>
        </div>

        <a href="/api" class="api-link">View API Status</a>

        <p class="footer">Melodio - Music Streaming Platform</p>
    </div>
</body>
</html>
