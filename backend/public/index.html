<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackify API</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #181818, #121212);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: #ffffff;
      padding: 1rem;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .logo svg {
      width: 2rem;
      height: 2rem;
      color: #1DB954;
    }

    .logo span {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .card {
      background-color: #181818;
      border: 1px solid #282828;
      border-radius: 0.5rem;
      padding: 1.5rem 1rem;
      width: 100%;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .status-dot {
      width: 0.5rem;
      height: 0.5rem;
      background-color: #1DB954;
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .status-text {
      font-size: 1rem;
      font-weight: 600;
    }

    .description {
      color: #b3b3b3;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    .link {
      display: inline-block;
      background-color: #1DB954;
      color: #000000;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background-color 0.2s, transform 0.2s;
    }

    .link:hover {
      background-color: #1ed760;
      transform: scale(1.04);
    }

    .link:active {
      transform: scale(0.98);
    }

    /* Tablet and up (640px+) */
    @media (min-width: 640px) {
      .logo {
        margin-bottom: 2rem;
      }

      .logo svg {
        width: 2.5rem;
        height: 2.5rem;
      }

      .logo span {
        font-size: 1.875rem;
      }

      .card {
        padding: 2rem 3rem;
      }

      .status {
        margin-bottom: 1rem;
      }

      .status-text {
        font-size: 1.25rem;
      }

      .description {
        margin-bottom: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <span>Hackify</span>
    </div>
    <div class="card">
      <div class="status">
        <div class="status-dot"></div>
        <span class="status-text">API server is running</span>
      </div>
      <p class="description">The Hackify API is up and ready to serve requests.</p>
      <a href="/api/docs" class="link">View API Documentation</a>
    </div>
  </div>
</body>
</html>
