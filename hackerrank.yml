version: 1.0
configuration:
  has_webserver: true
  scoring:
    command: npm test
    files:
      - output/task1.xml
      - output/task2.xml
      - output/task3.xml
      - output/task4.xml
  readonly_paths:
    # Frontend test files (37 tests covering 4 tasks)
    - frontend/__tests__/task1/usePlaylistOperations.test.ts
    - frontend/__tests__/task2/playerReducer.test.ts
    - frontend/__tests__/task3/useRecentlyPlayed.test.ts
    - frontend/__tests__/task4/useSearch.test.ts
    # Configuration files
    - frontend/jest.config.js
    - frontend/jest.setup.ts
  ide_config:
    default_open_files:
      - frontend/src/app/layout.tsx
      - backend/src/main.ts
    project_menu:
      run: npm start
      install: npm install
      test: echo "No test command configured"
