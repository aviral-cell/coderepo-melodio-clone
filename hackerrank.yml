version: 1.0
configuration:
  has_webserver: true
  scoring:
    command: npm test
    files:
      - output/junit.xml
  readonly_paths:
    # Backend test files
    - backend/src/features/users/__tests__/users.service.spec.ts
    - backend/src/features/artists/__tests__/artists.service.spec.ts
    - backend/src/features/albums/__tests__/albums.service.spec.ts
    - backend/src/features/auth/__tests__/auth.service.spec.ts
    - backend/src/features/tracks/__tests__/tracks.service.spec.ts
    - backend/src/features/search/__tests__/search.service.spec.ts
    - backend/src/features/playlists/__tests__/playlists.service.spec.ts
    # Frontend test files
    - frontend/src/shared/contexts/__tests__/playerReducer.test.ts
    - frontend/src/shared/hooks/__tests__/useDebounce.test.ts
    - frontend/src/shared/components/common/__tests__/TrackCard.test.tsx
    - frontend/src/shared/contexts/__tests__/PlayerContext.test.tsx
    # Configuration files
    - frontend/jest.config.js
    - frontend/jest.setup.ts
    - scripts/merge-junit.js
  ide_config:
    default_open_files:
      - PROBLEM_STATEMENT.md
    project_menu:
      run: bash setup.sh && npm start
      install: npm install
      test: rm -rf backend/test-results frontend/test-results junit.xml && npm test
