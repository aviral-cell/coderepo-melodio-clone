version: 1.0
configuration:
  has_webserver: true
  readonly_paths:
    - __tests__/**
    - vitest.workspace.ts
    - vitest.config.frontend.ts
    - vitest.config.backend.ts
    - test/**
    - backend/src/scripts/seed.ts
    - backend/src/shared/config/index.ts
  ide_config:
    default_open_files:
      - backend/src/app.ts
      - frontend/src/app/routes.tsx
    project_menu:
      run: bun start
      install: bun install
      test: bun run test
