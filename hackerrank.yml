version: 1.0
configuration:
  has_webserver: true
  readonly_paths:
    - __tests__/*
    - frontend/jest.config.js
    - frontend/jest.setup.ts
    - backend/jest.config.js
  ide_config:
    default_open_files:
      - frontend/src/main.tsx
      - backend/src/server.ts
    project_menu:
      run: npm start
      install: npm install
      test: echo "No test command configured"
